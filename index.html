<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape Room - Final Challenge</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Final Challenge</h1>
        <p class="instructions">Enter the four numbers from the clues:</p>
        
        <div class="input-group">
            <div class="clue-input">
                <label for="digit1">Clue 1:</label>
                <input type="number" id="digit1" class="digit-input" placeholder="?" min="0" max="9">
            </div>
            <div class="clue-input">
                <label for="digit2">Clue 2:</label>
                <input type="number" id="digit2" class="digit-input" placeholder="?" min="0" max="9">
            </div>
            <div class="clue-input">
                <label for="digit3">Clue 3:</label>
                <input type="number" id="digit3" class="digit-input" placeholder="?" min="0" max="9">
            </div>
            <div class="clue-input">
                <label for="digit4">Clue 4:</label>
                <input type="number" id="digit4" class="digit-input" placeholder="?" min="0" max="9">
            </div>
        </div>

        <button id="submitBtn" class="submit-btn">Submit</button>

        <div id="result" class="result hidden">
            <div id="resultContent"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
